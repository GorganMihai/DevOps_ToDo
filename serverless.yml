service: todo-serverless-service

frameworkVersion: '4.17.1'

provider:
  name: aws
  runtime: python3.13
  region: ${opt:region, 'eu-west-1'}
  stage: ${opt:stage, 'dev'}
  
  environment:
    TODO_TABLE: !Ref TodosTable
    PROCESSING_QUEUE_URL: !Ref ProcessingQueue
    S3_BUCKET_NAME: !Ref ArtifactsBucket
    
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource: !GetAtt TodosTable.Arn
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource: !GetAtt ProcessingQueue.Arn
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: !Sub "${ArtifactsBucket.Arn}/*"
        - Effect: Allow
          Action:
            - lambda:InvokeFunction
          Resource: 
            - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${self:service}-${self:provider.stage}-*"

plugins:
  - serverless-python-requirements

functions:
  createTodo:
    handler: create_todo.handler
    description: Create TODO items - manual trigger
    timeout: 10
    
  processTodo:
    handler: process_todo.handler
    description: Process TODO items from SQS
    timeout: 30
    events:
      - sqs:
          arn: !GetAtt ProcessingQueue.Arn
          batchSize: 5
          
  imageProcessor:
    handler: image_processor.handler
    description: Create real VOIS DevOps branded images
    timeout: 45
    memorySize: 512

resources:
  Resources:
    TodosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-todos
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
            
    ProcessingQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-processing
        VisibilityTimeout: 180

    ArtifactsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${self:provider.stage}-artifacts-${aws:accountId}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST]
              AllowedOrigins: ['*']
              MaxAge: 3000

  Outputs:
    TodoTableName:
      Description: DynamoDB Table Name
      Value: !Ref TodosTable
      
    ProcessingQueueUrl:
      Description: SQS Processing Queue URL
      Value: !Ref ProcessingQueue
      
    S3BucketName:
      Description: S3 Bucket for Images
      Value: !Ref ArtifactsBucket
      
    S3BucketUrl:
      Description: S3 Bucket URL
      Value: !Sub "https://${ArtifactsBucket}.s3.${AWS::Region}.amazonaws.com"